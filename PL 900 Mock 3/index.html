<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PL-900 Mock Test 3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;min-height:100vh;color:#1a1a2e}
:root{--purple:#5c4ee5;--purple-light:#ede9fb;--purple-dark:#3c2fb8;--border:#e0e0ee;--text:#1a1a2e;--muted:#6b7080;--bg:#f0f2f7;--white:#fff;--green:#16a34a;--red:#dc2626;--amber:#d97706;--answered:#5c4ee5;--review:#f59e0b;--current-border:#5c4ee5}
/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:#1a1a2e;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;line-height:1.1;text-align:center}
.nav-title{font-weight:600;font-size:15px;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.timer{display:flex;align-items:center;gap:6px;font-weight:600;font-size:15px;color:var(--text)}
.timer.urgent{color:var(--red)}

/* BACK BUTTON */
.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--muted);
  font-weight: 600;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background-color: var(--white);
  transition: all .15s;
  margin-right: 12px;
  cursor: pointer;
}
.back-button:hover {
  color: var(--purple);
  border-color: var(--purple);
  background-color: var(--purple-light);
}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 56px)}
/* SIDEBAR */
.sidebar{width:260px;min-width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sidebar-title{font-weight:600;font-size:13px;color:var(--text)}
.sidebar-count{font-size:12px;color:var(--muted);margin-top:2px}
.grid-scroll{flex:1;overflow-y:auto;padding:10px}
.q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.q-btn{width:100%;aspect-ratio:1;border:1.5px solid var(--border);background:#fff;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center}
.q-btn:hover{border-color:var(--purple);color:var(--purple)}
.q-btn.current{border:2px solid var(--purple);color:var(--purple);background:var(--purple-light)}
.q-btn.answered{background:var(--answered);border-color:var(--answered);color:#fff}
.q-btn.review{background:var(--review);border-color:var(--review);color:#fff}
.sidebar-legend{padding:10px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.ld-current{border:2px solid var(--purple)}
.ld-answered{background:var(--answered)}
.ld-review{background:var(--review)}
.ld-unans{border:1.5px solid var(--border)}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 28px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-num{font-size:13px;color:var(--muted)}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:20px}
.progress-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .3s}
.q-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px;min-height:300px}
.q-text{font-size:15px;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:6px}
.q-scenario{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px}
/* MCQ */
.options{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff}
.opt:hover{border-color:var(--purple);background:var(--purple-light)}
.opt.selected{border-color:var(--purple);background:var(--purple-light)}
.opt.selected-multi{border-color:var(--purple);background:var(--purple-light)}
.opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.selected .opt-radio{border-color:var(--purple);background:var(--purple)}
.opt.selected .opt-radio::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%}
.opt-check{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.selected-multi .opt-check{border-color:var(--purple);background:var(--purple)}
.opt.selected-multi .opt-check::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.opt-label{font-size:14px;color:var(--text)}
.opt-key{font-weight:700;margin-right:4px;color:var(--muted)}
/* YES/NO */
.yn-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
.yn-table th{background:#f5f5fb;padding:10px 14px;text-align:left;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-size:12px}
.yn-table th:first-child{width:70%}
.yn-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.yn-table tr:last-child td{border-bottom:none}
.yn-choices{display:flex;gap:8px;justify-content:center}
.yn-btn{padding:5px 16px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.yn-btn:hover{border-color:var(--purple);color:var(--purple)}
.yn-btn.yes-sel{background:#dcfce7;border-color:#16a34a;color:#15803d}
.yn-btn.no-sel{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
/* DROPDOWN */
.dd-sentence{font-size:14px;line-height:1.8;color:var(--text);margin-top:16px}
.dd-select{border:1.5px solid var(--purple);border-radius:8px;padding:6px 12px;font-size:14px;color:var(--purple);background:var(--purple-light);cursor:pointer;font-family:inherit;min-width:200px;outline:none}
.dd-select:focus{box-shadow:0 0 0 3px rgba(92,78,229,.15)}
/* DRAG & DROP */
.dnd-area{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.dnd-sources{flex:0 0 200px}
.dnd-targets{flex:1;min-width:240px}
.dnd-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
.drag-chip{padding:9px 14px;background:#f5f5fb;border:1.5px solid var(--border);border-radius:8px;font-size:13px;cursor:grab;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px;transition:all .15s;user-select:none}
.drag-chip:hover{border-color:var(--purple);background:var(--purple-light)}
.drag-chip.dragging{opacity:.4}
.drag-chip .handle{color:#bbb;font-size:12px}
.drop-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.drop-label{font-size:13px;color:var(--text);flex:0 0 180px;font-weight:500}
.drop-zone{flex:1;min-height:38px;border:1.5px dashed var(--border);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:6px;background:#fafafa;transition:all .15s;flex-wrap:wrap}
.drop-zone.drag-over{border-color:var(--purple);background:var(--purple-light)}
.drop-zone.filled{border-style:solid;border-color:var(--purple);background:var(--purple-light)}
.dropped-chip{background:var(--purple);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.dropped-chip .remove{color:rgba(255,255,255,.7);font-size:14px;line-height:1;cursor:pointer}
/* ORDERING */
.order-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.order-item{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;cursor:grab;transition:all .15s;user-select:none}
.order-item:hover{border-color:var(--purple)}
.order-item.dragging-order{opacity:.4;border-color:var(--purple)}
.order-item.drag-target{border-top:2px solid var(--purple)}
.order-num{width:24px;height:24px;background:var(--purple-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--purple);flex-shrink:0}
.order-text{font-size:13px;color:var(--text);flex:1}
.order-handle{color:#bbb;font-size:16px}
/* FOOTER */
.q-footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.mark-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;transition:all .15s}
.mark-btn:hover{background:#fff7ed;color:var(--amber)}
.mark-btn.marked{color:var(--amber)}
.nav-btns{display:flex;gap:10px}
.btn-prev,.btn-next,.btn-submit{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-prev{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-prev:hover{border-color:var(--purple);color:var(--purple)}
.btn-next{background:var(--purple);color:#fff}
.btn-next:hover{background:var(--purple-dark)}
.btn-submit{background:#dc2626;color:#fff}
.btn-submit:hover{background:#b91c1c}
/* INTRO */
.intro{max-width:860px;margin:40px auto;padding:0 20px}
.intro-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ms-logo{display:flex;gap:2px;flex-wrap:wrap;width:24px}
.ms-sq{width:10px;height:10px;border-radius:1px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.instr-card{background:#f5f5fb;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
.instr-card h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)}
.instr-card ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.instr-card li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--muted);line-height:1.5}
.instr-card li::before{content:'•';color:var(--purple);font-size:18px;line-height:1;flex-shrink:0;margin-top:-1px}
.start-btn{display:block;margin:0 auto;padding:14px 48px;background:var(--purple);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s}
.start-btn:hover{background:var(--purple-dark);transform:scale(1.02)}
/* RESULTS */
.results{max-width:860px;margin:40px auto;padding:0 20px}
.result-header{background:#fff;border-radius:16px;border:1px solid var(--border);padding:32px;text-align:center;margin-bottom:24px}
.result-score{font-size:56px;font-weight:800;color:var(--purple);line-height:1}
.result-pass{color:var(--green);font-size:20px;font-weight:700;margin-top:8px}
.result-fail{color:var(--red);font-size:20px;font-weight:700;margin-top:8px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
.res-stat{background:#f5f5fb;border-radius:10px;padding:16px;text-align:center}
.res-stat-val{font-size:22px;font-weight:700;color:var(--text)}
.res-stat-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.review-section{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:16px}
.review-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.answer-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.correct-badge{background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.wrong-badge{background:#fee2e2;color:#b91c1c;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.explanation{background:#f5f5fb;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6;border-left:3px solid var(--purple)}
.retry-btn{display:block;margin:24px auto;padding:12px 40px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
/* RESPONSIVE */
@media(max-width:700px){
.layout{flex-direction:column-reverse}
.sidebar{width:100%;height:160px;border-right:none;border-top:1px solid var(--border)}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.dnd-sources{flex:0 0 100%}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const QUESTIONS = [
{id:1,type:'drag-match',marks:3,
scenario:'You have a list of spices on Microsoft SharePoint. You are creating a canvas app to organize the spices.\n\nYou need to be able to perform the following actions with the app:\n- Use a separate screen in the app to add a task.\n- Display and scroll through the list of spices on your phone or tablet.\n- Update information such as brand and purchase date when you drill down to one of the spice records.\n\nYou need to identify the controls that help you create these features.',
question:'Match each control to its requirement. You may use each control once, more than once, or not at all.',
options:['Gallery','Form','Vertical container'],
targets:['Create a new task.','Display the list of current spices.','Scroll on different devices.','Update spice information.'],
answers:['Form','Gallery','Vertical container','Form'],
explanation:'Gallery displays/browses lists. Form creates/updates records. Vertical container enables responsive scrolling.'},

{id:2,type:'yesno',marks:2,
scenario:'You are creating a model-driven app.',
question:'For each of the following statements, select Yes if the statement is true. Otherwise, select No.',
statements:[
'To add tables to an app, tables are dragged onto the app canvas from the components area.',
'View definition is created in the component area of the app designer.',
'You must save, validate, and publish your app for others to see the changes.'
],
answers:['No','Yes','Yes'],
explanation:'Model-driven apps do not use a canvas like canvas apps. Views are created in the app designer. Publishing is required for users to see updates.'},

{id:3,type:'drag-match',marks:3,
scenario:'A company wants to use a model-driven app for its sales team.\nThe Sales manager wants to ensure each team member can modify their own views without affecting other views.\nThe IT manager wants to ensure the view is updated for all users.',
question:'Match the view type to each requirement.',
options:['Personal','Public','System'],
targets:['Sales manager','IT manager'],
answers:['Personal','System'],
explanation:'Personal views can be customized by individual users. System views apply to all users and are managed by IT/admins.'},

{id:4,type:'drag-match',marks:3,
scenario:'A company is building a model-driven app. You need to create and configure the objects needed for the app.',
question:'Which component categories should you use? Match each object to its component category.',
options:['UI','Data','Logic','Visualization'],
targets:['Relationship between applications','Entry forms','Business rule process','Views to review similar information'],
answers:['Data','UI','Logic','Visualization'],
explanation:'Relationships = data structure. Forms = user interface. Business rules = logic. Views = data visualization.'},

{id:5,type:'single',marks:2,
scenario:'You create a canvas app that users can use to view and update information about contacts and their recent orders. The app also sends emails to the contacts and books appointments.\n\nThe app uses three data connectors: Dataverse, Outlook, and Bookings.\n\nYou add the Copilot control to your app to allow users to ask questions about the contact base by using natural language.\n\nYou need to add the appropriate data source to the Copilot control.',
question:'Which data source should you add?',
options:['Bookings','Contacts table','Dataverse','Outlook'],
answer:2,
explanation:'Copilot answers questions based on data stored in Dataverse, not individual connectors like Outlook or Bookings.'},

{id:6,type:'single',marks:2,
scenario:'A company is undergoing a digital transformation by using Microsoft Power Platform.\n\nDepartments:\n• Customer service: Allow customers without licenses to create their own account and log tickets themselves.\n• Facilities: Allow technicians to take photos of warehouse equipment with mobile devices and record equipment condition.\n• Finance: Automatically copy details from invoices received in a shared mailbox into the finance system.\n• Marketing: Create a list of key words and phrases used by customers who provided feedback.\n\nYou need to determine which department can use a canvas app.',
question:'For which department should you develop a canvas app?',
options:['Marketing','Customer service','Facilities','Finance'],
answer:2,
explanation:'Canvas apps are ideal for mobile use, camera/photo capture, and custom data entry. Facilities technicians using mobile devices is a perfect fit.'},

{id:7,type:'dropdown',marks:2,
scenario:'You are configuring a model-driven app. The app requires users to enter key data when they create rows. The app must provide a global list of rows that all users can automatically access from the sitemap and filter by important columns.',
question:'What should you configure for each requirement?',
options:['Business rules','Required columns','Views','Validation rules'],
items:[
{label:'Ensure that key columns are populated when users create rows.',options:['Business rules','Required columns','Views','Validation rules'],answer:1},
{label:'Provide a list that all users can filter by using columns.',options:['Business rules','Required columns','Views','Validation rules'],answer:2}
],
explanation:'Required columns enforce data entry. Views provide filterable, global lists accessible from the sitemap.'},

{id:8,type:'drag-match',marks:3,
scenario:'A travel company plans to use Microsoft Power Platform to create tools that help travel agents book customer travel.',
question:'Match each requirement to the correct tool. Each tool may be used once, more than once, or not at all.',
options:['Business rule','Business process flow','Power Automate','Power BI'],
targets:['If a customer is travelling with a person under the age of 18, a field must display to collect date of birth for the under-18 traveler only.','Ensure that all travel agents use the same process with all customers.','Send a confirmation email to customers after reservations are complete.'],
answers:['Business rule','Business process flow','Power Automate'],
explanation:'Business rules = conditional logic. Business process flows = guided steps for all agents. Power Automate = notifications & automation.'},

{id:9,type:'yesno',marks:2,
scenario:'',
question:'For each of the following statements, select Yes if the statement is true. Otherwise, select No.',
statements:[
'A Microsoft Power Platform environment must contain a Microsoft Dataverse database.',
'An app created in an environment can only connect to the data sources that are deployed in the same environment.'
],
answers:['No','No'],
explanation:'Dataverse is optional in an environment. Apps can connect to many external data sources outside the environment.'},

{id:10,type:'single',marks:2,
scenario:'You are building a canvas app to allow users to record their expenses. The app also will support screen readers for users with visual impairments.\n\nYou have the following requirements:\n- Use a tool that identifies potential issues.\n- Use a tool that provides suggestions for modifying the app.',
question:'Which tool should you use?',
options:['Microsoft Power Platform admin center','Microsoft Trust Center','Accessibility Checker','Flow Checker'],
answer:2,
explanation:'Accessibility Checker identifies accessibility issues and suggests fixes — required for screen reader support.'},

{id:11,type:'dropdown',marks:2,
scenario:'A company is implementing Microsoft Power Platform.',
question:'Select the answer that correctly completes the sentence.',
items:[
{label:'Managed environments enable the use of ___.',options:['additional capacity','longer log retention','pipelines'],answer:2}
],
explanation:'Managed environments support deployment pipelines for controlled ALM (Application Lifecycle Management).'},

{id:12,type:'yesno',marks:2,
scenario:'A company is assessing the capabilities of Dataverse.',
question:'For each of the following statements, select Yes if the statement is true. Otherwise, select No.',
statements:[
'Dataverse can be hosted in the cloud and on-premises.',
'Dataverse includes a common schema of business objects by default.',
'Dataverse can support up to 8 TB of storage per instance.'
],
answers:['No','Yes','No'],
explanation:'Dataverse is cloud-only. It comes with standard tables (common schema). Storage limits are lower than 8 TB.'},

{id:13,type:'drag-match',marks:3,
scenario:'Match each tool to its task. Each tool may be used once, more than once, or not at all.',
question:'Match each task to the correct tool.',
options:['Power BI','Power Automate','Power Apps'],
targets:['Automate workflows.','Trigger an action from an event.','Create a custom mobile data entry screen.'],
answers:['Power Automate','Power Automate','Power Apps'],
explanation:'Power Automate handles workflows and event-triggered actions. Power Apps handles UI and mobile data entry.'},

{id:14,type:'yesno',marks:2,
scenario:'A company plans to implement Power Platform solutions.',
question:'For each of the following statements, select Yes if the statement is true. Otherwise, select No.',
statements:[
'Users can interact with canvas apps directly in Microsoft SharePoint and Teams.',
'Users can interact with model-driven apps directly in Microsoft SharePoint and Teams.'
],
answers:['Yes','No'],
explanation:'Model-driven apps run in browsers or Dynamics, not embedded like canvas apps. Canvas apps can be embedded in SharePoint and Teams.'},

{id:15,type:'dropdown',marks:2,
scenario:'An automobile manufacturer requires workers to collect information about car defects in a defect sheet. Historically, workers have left out key information. The floor manager must contact workers to obtain missing information.\n\nThe manufacturer requires a process that ensures the floor manager receives a fully completed defect sheet on initial submission.',
question:'Select the answer that correctly completes the sentence.',
items:[
{label:'A digital version of the defect sheet with rules to ensure pre-submission completion can be created by using ___.',options:['an AI Builder model','a Power Apps app','a Power Automate cloud flow','a Power BI report'],answer:1}
],
explanation:'Power Apps allows mandatory fields, validation rules, and structured data entry to ensure complete submissions.'},

{id:16,type:'multi',marks:3,
scenario:'A company uses Microsoft 365, SharePoint Online, and Microsoft Teams.\n\nYou need to recommend tools to build a solution that meets the following requirements:\n- Synchronize data daily from an external Microsoft SQL Server instance.\n- Send a report automatically to specific company executives.\n- Ensure that approvals are routed to the correct company executive.',
question:'Which TWO tools or components should you recommend? Each correct answer presents part of the solution.',
options:['Microsoft Word','Microsoft Excel','Power Automate','Microsoft Dataverse','Power BI'],
answer:[2,4],
explanation:'Power Automate: sync data + approvals. Power BI: reporting & executive dashboards.'},

{id:17,type:'single',marks:2,
scenario:'A company uses Dynamics 365 Supply Chain Management. When a sales order is created for one of the customers that a specific user manages, a Microsoft Outlook task must be created to remind the user to perform follow-up activities.',
question:'Which feature should you use?',
options:['Business Events','Power Automate','AI Builder','Microsoft Dataverse'],
answer:1,
explanation:'Power Automate reacts to events (new sales order) and creates Outlook tasks automatically.'},

{id:18,type:'dropdown',marks:2,
scenario:'You are implementing an automation by using Power Automate. Based on a predefined schedule, the automation must check for any issues on a GitHub repository. If new issues exist, it must create tasks in Dataverse to resolve the issues.',
question:'Select the answer that correctly completes the sentence.',
items:[

const TOTAL_MARKS = QUESTIONS.reduce((s,q)=>s+q.marks,0);
const PASS_MARK = Math.ceil(TOTAL_MARKS*0.84);

let state = {
  phase:'intro',
  current:0,
  answers:{},
  marked:new Set(),
  timer:50*60,
  timerInterval:null,
  startTime:null
};

function formatTime(s){
  const m=Math.floor(s/60);const sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function getScore(){
  let score=0;
  QUESTIONS.forEach((q,i)=>{
    const ans=state.answers[i];
    if(!ans)return;
    if(q.type==='single'){if(ans===q.answer)score+=q.marks;}
    else if(q.type==='multi'){
      const correct=[...q.answer].sort().join(',');
      const given=[...ans].sort().join(',');
      if(correct===given)score+=q.marks;
    }else if(q.type==='yesno'){
      let allRight=ans.every((v,j)=>v===q.answers[j]);
      if(allRight)score+=q.marks;
    }else if(q.type==='dropdown'){
      let allRight=ans.every((v,j)=>v===q.items[j].answer);
      if(allRight)score+=q.marks;
    }else if(q.type==='drag-match'){
      let allRight=ans.every((v,j)=>v===q.answers[j]);
      if(allRight)score+=q.marks;
    }else if(q.type==='ordering'){
      let allRight=ans.every((v,j)=>v===q.answers[j]);
      if(allRight)score+=q.marks;
    }
  });
  return score;
}

function isCorrect(qi){
  const q=QUESTIONS[qi];const ans=state.answers[qi];
  if(!ans)return false;
  if(q.type==='single')return ans===q.answer;
  if(q.type==='multi')return [...q.answer].sort().join(',')===[...ans].sort().join(',');
  if(q.type==='yesno')return ans.every((v,j)=>v===q.answers[j]);
  if(q.type==='dropdown')return ans.every((v,j)=>v===q.items[j].answer);
  if(q.type==='drag-match')return ans.every((v,j)=>v===q.answers[j]);
  if(q.type==='ordering')return ans.every((v,j)=>v===q.answers[j]);
  return false;
}

function renderQuestion(q,qi){
  let html='';
  if(q.scenario){
    html+=`<p class="q-scenario">${q.scenario.replace(/\n/g,'<br>')}</p>`;
  }
  html+=`<p class="q-text">${q.question}</p>`;
  
  if(q.type==='single'){
    const sel=state.answers[qi]!==undefined?state.answers[qi]:null;
    html+=`<div class="options">`;
    q.options.forEach((o,i)=>{
      const keys=['A','B','C','D','E'];
      html+=`<div class="opt${sel===i?' selected':''}" onclick="selectSingle(${qi},${i})">
        <div class="opt-radio"></div>
        <span class="opt-label"><span class="opt-key">${keys[i]}.</span>${o}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  else if(q.type==='multi'){
    const sel=state.answers[qi]||[];
    const keys=['A','B','C','D','E'];
    html+=`<p style="font-size:12px;color:var(--muted);margin-top:8px;margin-bottom:2px">Select all that apply</p>`;
    html+=`<div class="options">`;
    q.options.forEach((o,i)=>{
      html+=`<div class="opt${sel.includes(i)?' selected-multi':''}" onclick="toggleMulti(${qi},${i})">
        <div class="opt-check"></div>
        <span class="opt-label"><span class="opt-key">${keys[i]}.</span>${o}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  else if(q.type==='yesno'){
    const sel=state.answers[qi]||q.statements.map(()=>null);
    html+=`<table class="yn-table">
      <thead><tr><th>Statement</th><th style="text-align:center;width:70px">Yes</th><th style="text-align:center;width:70px">No</th></tr></thead>
      <tbody>`;
    q.statements.forEach((s,i)=>{
      html+=`<tr>
        <td style="font-size:13px;color:var(--text);line-height:1.5">${s}</td>
        <td style="text-align:center"><button class="yn-btn${sel[i]==='Yes'?' yes-sel':''}" onclick="setYN(${qi},${i},'Yes')">Yes</button></td>
        <td style="text-align:center"><button class="yn-btn${sel[i]==='No'?' no-sel':''}" onclick="setYN(${qi},${i},'No')">No</button></td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }
  else if(q.type==='dropdown'){
    const sel=state.answers[qi]||(q.items.map(()=>null));
    html+=`<div style="margin-top:16px;display:flex;flex-direction:column;gap:14px">`;
    q.items.forEach((item,i)=>{
      const parts=item.label.split('___');
      html+=`<div style="font-size:14px;line-height:1.8;color:var(--text)">
        ${parts[0]}
        <select class="dd-select" onchange="setDropdown(${qi},${i},this.value)" style="margin:0 4px">
          <option value="">Select...</option>
          ${item.options.map((o,oi)=>`<option value="${oi}"${sel[i]==oi?' selected':''}>${o}</option>`).join('')}
        </select>
        ${parts[1]||''}
      </div>`;
    });
    html+=`</div>`;
  }
  else if(q.type==='drag-match'){
    const current=state.answers[qi]||(q.targets.map(()=>null));
    const usedOptions=current.filter(v=>v!==null);
    html+=`<div class="dnd-area" id="dnd-${qi}">
      <div class="dnd-sources">
        <div class="dnd-title">Options</div>
        <div id="sources-${qi}">`;
    q.options.forEach((o,oi)=>{
      const usedCount=usedOptions.filter(v=>v===o).length;
      const totalAllowed=q.answers.filter(v=>v===o).length;
      if(usedCount<totalAllowed||usedCount===0){
        html+=`<div class="drag-chip" draggable="true" data-val="${o}" data-qi="${qi}" id="chip-${qi}-${oi}" ondragstart="dndStart(event,'${o}',${qi})" ondragend="dndEnd(event)">
          <span class="handle">⠿</span>${o}
        </div>`;
      }else{
        html+=`<div class="drag-chip" style="opacity:.35;cursor:default" data-qi="${qi}">
          <span class="handle">⠿</span>${o}
        </div>`;
      }
    });
    html+=`</div></div>
      <div class="dnd-targets">
        <div class="dnd-title">Match Here</div>`;
    q.targets.forEach((t,ti)=>{
      const dropped=current[ti];
      html+=`<div class="drop-row">
        <div class="drop-label">${t}</div>
        <div class="drop-zone${dropped?' filled':''}" 
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="dndDrop(event,${qi},${ti})"
          data-ti="${ti}" data-qi="${qi}">
          ${dropped?`<div class="dropped-chip">${dropped}<span class="remove" onclick="dndRemove(${qi},${ti})">✕</span></div>`:'<span style="color:#bbb;font-size:12px">Drop here...</span>'}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  else if(q.type==='ordering'){
    const order=state.answers[qi]||[...Array(q.options.length).keys()];
    html+=`<div class="order-list" id="order-${qi}">`;
    order.forEach((optIdx,pos)=>{
      html+=`<div class="order-item" draggable="true" data-pos="${pos}" data-qi="${qi}"
        ondragstart="orderStart(event,${pos},${qi})"
        ondragend="orderEnd(event)"
        ondragover="event.preventDefault();this.classList.add('drag-target')"
        ondragleave="this.classList.remove('drag-target')"
        ondrop="orderDrop(event,${pos},${qi})">
        <div class="order-num">${pos+1}</div>
        <span class="order-text">${q.options[optIdx]}</span>
        <span class="order-handle">⠿</span>
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

    }
    else if(q.type==='yesno'){
      html+=`<div style="margin-top:8px">`;
      q.statements.forEach((s,j)=>{
        const given=ans?ans[j]:null;
        html+=`<div style="font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:8px">
          <span style="color:var(--muted);flex:1">${s}</span>
          <span style="background:${given===q.answers[j]?'#dcfce7':'#fee2e2'};color:${given===q.answers[j]?'#15803d':'#b91c1c'};padding:2px 8px;border-radius:5px;font-size:11px;white-space:nowrap">You: ${given||'—'} | Correct: ${q.answers[j]}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    else if(q.type==='dropdown'){
      html+=`<div style="margin-top:8px">`;
      q.items.forEach((item,j)=>{
        const given=ans?ans[j]:null;
        const givenText=given!==null?item.options[given]:'—';
        const correctText=item.options[item.answer];
        html+=`<div style="font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:8px">
          <span style="color:var(--muted);flex:1">${item.label.replace('___','…')}</span>
          <span style="background:${givenText===correctText?'#dcfce7':'#fee2e2'};color:${givenText===correctText?'#15803d':'#b91c1c'};padding:2px 8px;border-radius:5px;font-size:11px;white-space:nowrap">You: ${givenText} | Correct: ${correctText}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    else if(q.type==='drag-match'){
      html+=`<div style="margin-top:8px">`;
      q.targets.forEach((t,j)=>{
        const given=ans?ans[j]:null;
        html+=`<div style="font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:8px">
          <span style="color:var(--muted);flex:1">${t}</span>
          <span style="background:${given===q.answers[j]?'#dcfce7':'#fee2e2'};color:${given===q.answers[j]?'#15803d':'#b91c1c'};padding:2px 8px;border-radius:5px;font-size:11px;white-space:nowrap">You: ${given||'—'} | Correct: ${q.answers[j]}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    else if(q.type==='ordering'){
      const givenOrder=ans||[...Array(q.options.length).keys()];
      html+=`<div style="margin-top:8px;font-size:12px;color:var(--muted)">
        Your order: ${givenOrder.map((v,i)=>`${i+1}. ${q.options[v]}`).join(' → ')}<br>
        Correct: ${q.answers.map((v,i)=>`${i+1}. ${q.options[v]}`).join(' → ')}
      </div>`;
    }
    
    html+=`<div class="explanation">💡 ${q.explanation}</div></div>`;
  });
  
  html+=`<button class="retry-btn" onclick="retryExam()">🔄 Retry Test</button></div>`;
  return html;
}

// Event handlers
function startExam(){
  state.phase='exam';state.startTime=Date.now();
  state.timerInterval=setInterval(()=>{
    state.timer--;
    const el=document.getElementById('timer-display');
    if(el)el.textContent=formatTime(state.timer);
    if(state.timer<=300&&el)el.parentElement.classList.add('urgent');
    if(state.timer<=0){clearInterval(state.timerInterval);submitExam();}
  },1000);
  render();
}

function goto(i){state.current=i;render();}
function prev(){if(state.current>0){state.current--;render();}}
function next(){if(state.current<QUESTIONS.length-1){state.current++;render();}}

function toggleMark(){
  if(state.marked.has(state.current))state.marked.delete(state.current);
  else state.marked.add(state.current);
  render();
}

function submitExam(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  state.phase='results';render();
}

function retryExam(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  state={phase:'intro',current:0,answers:{},marked:new Set(),timer:50*60,timerInterval:null,startTime:null};
  render();
}

function selectSingle(qi,val){
  state.answers[qi]=val;render();
}

function toggleMulti(qi,val){
  const cur=[...(state.answers[qi]||[])];
  const idx=cur.indexOf(val);
  if(idx===-1)cur.push(val);else cur.splice(idx,1);
  state.answers[qi]=cur;render();
}

function setYN(qi,si,val){
  const cur=[...(state.answers[qi]||QUESTIONS[qi].statements.map(()=>null))];
  cur[si]=val;
  state.answers[qi]=cur;render();
}

function setDropdown(qi,ii,val){
  const q=QUESTIONS[qi];
  const cur=[...(state.answers[qi]||q.items.map(()=>null))];
  cur[ii]=val===''?null:parseInt(val);
  state.answers[qi]=cur;render();
}

// DnD for matching
let dragVal=null,dragQi=null;
function dndStart(e,val,qi){dragVal=val;dragQi=qi;e.currentTarget.classList.add('dragging');}
function dndEnd(e){e.currentTarget.classList.remove('dragging');}
function dndDrop(e,qi,ti){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragVal===null||dragQi!==qi)return;
  const q=QUESTIONS[qi];
  const cur=[...(state.answers[qi]||q.targets.map(()=>null))];
  cur[ti]=dragVal;
  state.answers[qi]=cur;dragVal=null;render();
}
function dndRemove(qi,ti){
  const q=QUESTIONS[qi];
  const cur=[...(state.answers[qi]||q.targets.map(()=>null))];
  cur[ti]=null;
  state.answers[qi]=cur;render();
}

// Ordering DnD
let orderDragPos=null,orderDragQi=null;
function orderStart(e,pos,qi){orderDragPos=pos;orderDragQi=qi;e.currentTarget.classList.add('dragging-order');}
function orderEnd(e){
  document.querySelectorAll('.order-item').forEach(el=>{el.classList.remove('dragging-order','drag-target');});
}
function orderDrop(e,pos,qi){
  e.preventDefault();
  if(orderDragPos===null||orderDragQi!==qi||orderDragPos===pos)return;
  const q=QUESTIONS[qi];
  const cur=[...(state.answers[qi]||[...Array(q.options.length).keys()])];
  const moved=cur.splice(orderDragPos,1)[0];
  cur.splice(pos,0,moved);
  state.answers[qi]=cur;orderDragPos=null;render();
}

function attachExamEvents(){}

render();
</script>
