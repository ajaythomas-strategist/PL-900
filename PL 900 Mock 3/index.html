<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL-900 Mock-3 — KVJ Analytics</title>
<!-- Google Fonts Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   PL-900 Mock Test 3 Premium Theme (Aligned with Mock Test 1 & 2)
   ========================================================================== */
:root {
  /* Color Palette - HSL Tailored Colors */
  --primary: hsl(252, 78%, 60%);        /* Modern Royal Purple */
  --primary-hover: hsl(252, 78%, 52%);
  --primary-light: hsl(252, 78%, 97%);
  
  --secondary: hsl(199, 89%, 48%);      /* Electric Sky Blue */
  --secondary-hover: hsl(199, 89%, 40%);
  --secondary-light: hsl(199, 89%, 97%);

  --accent: hsl(36, 100%, 50%);         /* Warning Gold for Mark for Review */
  --accent-light: hsl(36, 100%, 96%);

  --success: hsl(142, 76%, 36%);        /* Emerald Green for Pass/Correct */
  --success-light: hsl(142, 76%, 96%);

  --danger: hsl(354, 76%, 48%);         /* Crimson Red for Fail/Incorrect */
  --danger-light: hsl(354, 76%, 96%);

  --neutral-bg: hsl(210, 40%, 98%);     /* Soft Cool Grey for Page Background */
  --neutral-card: hsl(0, 0%, 100%);     /* Pure White Card Background */
  --neutral-border: hsl(210, 14%, 91%); /* Thin grey dividers */
  
  /* Text Colors */
  --text-main: hsl(210, 24%, 16%);      /* Deep Slate for Primary Text */
  --text-muted: hsl(210, 12%, 46%);     /* Medium Slate for Secondary/Muted Text */
  --text-light: hsl(210, 8%, 60%);

  /* Shadow Systems */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
  --shadow-premium: 0 20px 25px -5px rgba(127, 90, 240, 0.06), 0 10px 10px -5px rgba(0, 0, 0, 0.02);

  /* Borders and Border Radii */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-round: 50%;
  
  /* Animations */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Legacy compatibility overrides */
  --bg: var(--neutral-bg);
  --card-bg: var(--neutral-card);
  --text: var(--text-main);
  --border: var(--neutral-border);
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  height:100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* BACK BUTTON */
.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--neutral-border);
  background-color: var(--neutral-card);
  transition: all var(--transition-fast);
  margin-right: 20px;
  cursor: pointer;
}

.back-button:hover {
  color: var(--primary);
  border-color: hsl(252, 78%, 90%);
  background-color: var(--primary-light);
  transform: translateX(-2px);
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 72px;
  background-color: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--neutral-border);
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-left-group {
  display: flex;
  align-items: center;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
  font-size: 18px;
  color: var(--text-main);
}
.logo-area img {
  height: 32px;
}

.top-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.timer-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background-color: var(--neutral-bg);
  border: 1px solid var(--neutral-border);
  padding: 8px 16px;
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-main);
  transition: all var(--transition-fast);
}

.timer-box.warning {
  background-color: var(--danger-light);
  border-color: hsl(354, 76%, 85%);
  color: var(--danger);
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.03); }
}

/* BODY */
.body-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 32px;
  gap: 32px;
  background-color: var(--neutral-bg);
}

/* SIDEBAR / NAVIGATOR */
.sidebar-wrapper {
  width: 320px;
  min-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.nav-card {
  background: var(--neutral-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--neutral-border);
  box-shadow: var(--shadow-premium);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.nav-header {
  padding: 24px;
  border-bottom: 1px solid var(--neutral-border);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.nav-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-main);
}

.nav-status {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
}

.nav-body {
  padding: 24px;
  max-height: 400px;
  overflow-y: auto;
}

.q-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.q-btn {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  border: 1px solid var(--neutral-border);
  background: var(--neutral-card);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-main);
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.q-btn:hover {
  background: var(--primary-light);
  border-color: hsl(252, 78%, 80%);
  color: var(--primary);
}

.q-btn.active {
  border: 2px solid var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.q-btn.answered {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

.q-btn.answered:hover {
  background: var(--primary-hover);
  border-color: var(--primary-hover);
}

.q-btn.review {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.q-btn.review:hover {
  background: hsl(36, 100%, 42%);
  border-color: hsl(36, 100%, 42%);
}

.nav-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--neutral-border);
  background: hsl(210, 40%, 99%);
}

.legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.leg-box {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  border: 1px solid var(--neutral-border);
}

.leg-box.active {
  border: 2px solid var(--primary);
}

.leg-box.answered {
  background: var(--primary);
  border: none;
}

.leg-box.review {
  background: var(--accent);
  border: none;
}

/* CONTENT / QUESTION CARD */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.q-card {
  background: var(--neutral-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--neutral-border);
  box-shadow: var(--shadow-premium);
  display: flex;
  flex-direction: column;
  max-width: 1000px;
  width: 100%;
  margin: 0 auto;
  height: 100%;
}

.q-card-top {
  padding: 28px 40px;
  border-bottom: 1px solid var(--neutral-border);
}

.breadcrumb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.bc-text {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 600;
}

.progress-container {
  height: 8px;
  background: var(--neutral-bg);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--primary);
  transition: width var(--transition-normal);
}

.q-card-body {
  padding: 40px;
  flex: 1;
  overflow-y: auto;
}

.q-scenario {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 24px;
  background: var(--primary-light);
  padding: 20px 24px;
  border-radius: var(--radius-md);
  border-left: 4px solid var(--primary);
  border-top: 1px solid hsl(252, 78%, 94%);
  border-right: 1px solid hsl(252, 78%, 94%);
  border-bottom: 1px solid hsl(252, 78%, 94%);
}

.q-text {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1.5;
  margin-bottom: 28px;
}

/* OPTIONS */
.options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.opt {
  display: flex;
  align-items: center;
  gap: 16px;
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  cursor: pointer;
  transition: all var(--transition-fast);
  background-color: var(--neutral-card);
}

.opt:hover {
  background-color: var(--primary-light);
  border-color: hsl(252, 78%, 80%);
}

.opt.selected {
  border: 2px solid var(--primary);
  background-color: var(--primary-light);
}

.radio-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid hsl(210, 14%, 80%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition-fast);
}

.opt.selected .radio-circle {
  border-color: var(--primary);
}

.opt.selected .radio-circle::after {
  content: '';
  width: 10px;
  height: 10px;
  background: var(--primary);
  border-radius: 50%;
}

.opt-label {
  font-weight: 700;
  color: var(--text-muted);
  font-size: 16px;
  width: 24px;
}

.opt-content {
  font-size: 16px;
  color: var(--text-main);
  font-weight: 500;
}

/* CARD FOOTER */
.card-footer {
  padding: 24px 40px;
  border-top: 1px solid var(--neutral-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: rgba(255, 255, 255, 0.5);
}

.nav-btns {
  display: flex;
  gap: 12px;
}

.btn {
  padding: 10px 24px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--neutral-border);
  background: var(--neutral-card);
  color: var(--text-main);
}

.btn:hover:not(:disabled) {
  background: var(--primary-light);
  border-color: hsl(252, 78%, 80%);
  color: var(--primary);
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  border: none;
}

.btn-primary:hover:not(:disabled) {
  background: var(--primary-hover);
  color: #fff;
}

.btn-danger {
  background: var(--danger);
  color: #fff;
  border: none;
}

.btn-danger:hover {
  background: hsl(354, 76%, 40%);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn.marked {
  background: var(--accent-light);
  border-color: hsl(36, 100%, 80%);
  color: var(--accent);
}

/* YES/NO Table */
.yn-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  background: var(--neutral-card);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.yn-table th {
  background: var(--neutral-bg);
  padding: 14px 20px;
  text-align: left;
  font-weight: 700;
  color: var(--text-muted);
  border-bottom: 1px solid var(--neutral-border);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.yn-table td {
  padding: 16px 20px;
  border-bottom: 1px solid var(--neutral-border);
  vertical-align: middle;
}

.yn-btn {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-round);
  border: 2px solid hsl(210, 14%, 80%);
  background: var(--neutral-card);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  padding: 0;
  position: relative;
}

.yn-btn:hover {
  border-color: var(--primary);
}

.yn-btn.selected-yes {
  border-color: var(--success);
  background: var(--success-light);
}

.yn-btn.selected-yes::after {
  content: '';
  width: 12px;
  height: 12px;
  background: var(--success);
  border-radius: var(--radius-round);
}

.yn-btn.selected-no {
  border-color: var(--danger);
  background: var(--danger-light);
}

.yn-btn.selected-no::after {
  content: '';
  width: 12px;
  height: 12px;
  background: var(--danger);
  border-radius: var(--radius-round);
}

.yn-btn.selected-yes-ghost {
  border-color: var(--success);
  background: var(--success-light);
  opacity: 0.7;
}

.yn-btn.selected-no-ghost {
  border-color: var(--danger);
  background: var(--danger-light);
  opacity: 0.7;
}

/* DRAG MATCH */
.drag-drop {
  margin-top: 10px;
}

.dd-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.dd-label {
  width: 240px;
  font-size: 15px;
  color: var(--text-main);
  font-weight: 700;
  flex-shrink: 0;
}

.dd-target {
  flex: 1;
  min-height: 48px;
  border: 2px dashed var(--neutral-border);
  border-radius: var(--radius-md);
  padding: 8px 16px;
  font-size: 15px;
  color: var(--text-muted);
  background: var(--neutral-bg);
  display: flex;
  align-items: center;
  transition: all var(--transition-fast);
}

.dd-target.has-item {
  border-style: solid;
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.dd-options {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
  padding: 24px;
  background: var(--neutral-bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--neutral-border);
}

.dd-chip {
  padding: 10px 20px;
  border-radius: 24px;
  background: var(--neutral-card);
  border: 1.5px solid var(--neutral-border);
  color: var(--text-main);
  font-size: 14px;
  cursor: grab;
  user-select: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-sm);
}

.dd-chip.used {
  opacity: 0.35;
  cursor: not-allowed;
  background: hsl(210, 14%, 93%);
  border-color: var(--neutral-border);
  box-shadow: none;
}

.dd-chip:hover:not(.used) {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

/* ORDERING */
.order-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.order-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--neutral-card);
  border: 1.5px solid var(--neutral-border);
  border-radius: var(--radius-md);
  cursor: grab;
  transition: all var(--transition-fast);
}

.order-item:hover {
  border-color: var(--primary);
}

.order-item.dragging-order {
  opacity: 0.4;
  border-color: var(--primary);
  background: var(--primary-light);
}

.order-num {
  width: 28px;
  height: 28px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-round);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.order-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-main);
  flex: 1;
}

/* OVERLAY/MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: var(--neutral-card);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 520px;
  width: 92%;
  text-align: center;
  box-shadow: var(--shadow-premium);
  border: 1px solid var(--neutral-border);
}

.modal h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-main);
  margin-bottom: 8px;
}

.modal p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

.summary-cards {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 24px;
}

.sum-card {
  flex: 1;
  border-radius: var(--radius-md);
  padding: 16px 12px;
  text-align: center;
  border: 1px solid var(--neutral-border);
}

.sum-card .num {
  font-size: 28px;
  font-weight: 800;
}

.sum-card .lbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .07em;
  margin-top: 4px;
}

.sum-card.pending {
  background: var(--danger-light);
  border-color: hsl(354, 76%, 90%);
}
.sum-card.pending .num, .sum-card.pending .lbl {
  color: var(--danger);
}

.sum-card.review {
  background: var(--accent-light);
  border-color: hsl(36, 100%, 90%);
}
.sum-card.review .num, .sum-card.review .lbl {
  color: var(--accent);
}

.sum-card.answered {
  background: var(--success-light);
  border-color: hsl(142, 76%, 90%);
}
.sum-card.answered .num, .sum-card.answered .lbl {
  color: var(--success);
}

.modal-q-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 28px;
  max-height: 180px;
  overflow-y: auto;
  padding: 4px;
}

.modal-q-btn {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--neutral-border);
  background: var(--neutral-card);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-main);
  transition: all var(--transition-fast);
}

.modal-q-btn.answered {
  background: var(--success-light);
  border-color: hsl(142, 76%, 80%);
  color: var(--success);
}

.modal-q-btn.review {
  background: var(--accent-light);
  border-color: hsl(36, 100%, 80%);
  color: var(--accent);
}

/* WELCOME / REPORT */
.welcome-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 60px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  background-color: var(--neutral-bg);
}

.welcome-card {
  max-width: 1000px;
  width: 100%;
  text-align: center;
  background: var(--neutral-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--neutral-border);
  box-shadow: var(--shadow-premium);
  padding: 48px;
}

.w-title {
  font-size: 36px;
  font-weight: 800;
  color: var(--text-main);
  margin-bottom: 12px;
  letter-spacing: -0.8px;
}

.w-sub {
  font-size: 18px;
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 48px;
  line-height: 1.5;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}

.info-card {
  background-color: var(--neutral-bg);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-md);
  padding: 24px 20px;
  text-align: center;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.info-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: hsl(252, 78%, 90%);
}

.info-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-round);
  background-color: var(--neutral-card);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;

function renderQuestion(q, qi){
  const ans = state.answers[qi];
  if(q.type==='single'){
    return `<div class="options">${q.options.map((o,i)=>`
      <div class="opt ${ans===i?'selected':''}" onclick="selectSingle(${qi},${i})">
        <div class="radio-circle"></div>
        <span class="opt-label">${String.fromCharCode(65+i)}.</span>
        <span class="opt-content">${o}</span>
      </div>`).join('')}</div>`;
  }
  if(q.type==='multi'){
    const sel = ans || [];
    return `<div class="options">${q.options.map((o,i)=>`
      <div class="opt ${sel.includes(i)?'selected':''}" onclick="toggleMulti(${qi},${i})">
        <div class="radio-circle" style="border-radius:4px"></div>
        <span class="opt-label">${String.fromCharCode(65+i)}.</span>
        <span class="opt-content">${o}</span>
      </div>`).join('')}</div>`;
  }
  if(q.type==='yesno'){
    const sel = ans || QUESTIONS[qi].statements.map(()=>null);
    return `<table class="yn-table">
      <thead><tr><th>Statement</th><th style="width:100px;text-align:center">Yes</th><th style="width:100px;text-align:center">No</th></tr></thead>
      <tbody>${q.statements.map((s,i)=>`
        <tr>
          <td>${s}</td>
          <td style="text-align:center"><button class="yn-btn ${sel[i]==='Yes'?'selected-yes':''}" onclick="setYN(${qi},${i},'Yes')"></button></td>
          <td style="text-align:center"><button class="yn-btn ${sel[i]==='No'?'selected-no':''}" onclick="setYN(${qi},${i},'No')"></button></td>
        </tr>`).join('')}</tbody></table>`;
  }
  if(q.type==='dropdown'){
    const sel = ans || q.items.map(()=>null);
    return `<div class="options">${q.items.map((item,i)=>`
      <div style="margin-bottom:16px;background:#F9FAFB;padding:16px;border-radius:10px;border:1px solid #E5E7EB">
        <p style="font-size:14px;font-weight:700;color:#374151;margin-bottom:12px">${item.label.replace('___','...')}</p>
        <select onchange="setDropdown(${qi},${i},this.value)" style="width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #D1D5DB;font-size:14px;color:#1F2937">
          <option value="">Select an option...</option>
          ${item.options.map((o,oi)=>`<option value="${oi}" ${sel[i]==oi?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>`).join('')}</div>`;
  }
  if(q.type==='drag-match'){
    const cur = ans || q.targets.map(()=>null);
    return `<div class="drag-drop">
      ${q.targets.map((t,i)=>`
        <div class="dd-row">
          <div class="dd-label">${t}</div>
          <div class="dd-target ${cur[i]?'has-item':''}" ondragover="event.preventDefault()" ondrop="dndDrop(event,${qi},${i})" onclick="dndRemove(${qi},${i})">
            ${cur[i] || 'Drop here...'}
          </div>
        </div>`).join('')}
      <div class="dd-options">
        ${q.options.map(o=>`<div class="dd-chip" draggable="true" ondragstart="dndStart(event,'${o}',${qi})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:8px;opacity:0.8"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>${o}</div>`).join('')}
      </div>
    </div>`;
  }
  if(q.type==='ordering'){
    const order = ans || [...Array(q.options.length).keys()];
    return `<div class="order-list">
      ${order.map((idx,pos)=>`
        <div class="order-item" draggable="true" ondragstart="orderStart(event,${pos},${qi})" ondragover="event.preventDefault()" ondrop="orderDrop(event,${pos},${qi})">
          <div class="order-num">${pos+1}</div>
          <div class="order-text">${q.options[idx]}</div>
          <div style="color:#CBD5E1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
        </div>`).join('')}
    </div>`;
  }
  return '';
}


function startTimer(){
  timerInterval = setInterval(()=>{
    state.seconds--;
    if(state.seconds<=0) submitExam();
    renderTimer();
  },1000);
}

function renderTimer(){
  const el = document.getElementById('timer-display');
  if(!el) return;
  const m = Math.floor(state.seconds/60);
  const s = state.seconds % 60;
  el.textContent = m + ':' + (s<10?'0':'') + s;
  if(state.seconds <= 300) el.parentElement.classList.add('warning');
}

function getScore(){
  return QUESTIONS.reduce((s,q,i)=>s+(isCorrect(i)?q.marks:0),0);
}

function isCorrect(qi){
  const q=QUESTIONS[qi]; const ans=state.answers[qi];
  if(ans===undefined) return false;
  if(q.type==='single') return ans===q.answer;
  if(q.type==='multi') return JSON.stringify([...ans].sort())===JSON.stringify([...q.answer].sort());
  if(q.type==='yesno') return JSON.stringify(ans)===JSON.stringify(q.answers);
  if(q.type==='dropdown') return ans.every((v,i)=>v===q.items[i].answer);
  if(q.type==='drag-match') return JSON.stringify(ans)===JSON.stringify(q.answers);
  if(q.type==='ordering') return JSON.stringify(ans)===JSON.stringify(q.answers);
  return false;
}

function startExam(){ state.screen='quiz'; startTimer(); render(); }
function goTo(i){ state.current=i; render(); }
function nextQ(){ state.current++; render(); }
function prevQ(){ state.current--; render(); }
function toggleMark(i){ state.marked[i]=!state.marked[i]; render(); }
function selectSingle(qi,v){ state.answers[qi]=v; render(); }
function toggleMulti(qi,v){
  const cur = state.answers[qi] || [];
  const idx = cur.indexOf(v);
  if(idx===-1) cur.push(v); else cur.splice(idx,1);
  state.answers[qi]=[...cur]; render();
}
function setYN(qi,si,v){
  const cur = state.answers[qi] || QUESTIONS[qi].statements.map(()=>null);
  cur[si]=v; state.answers[qi]=[...cur]; render();
}
function setDropdown(qi,ii,v){
  const cur = state.answers[qi] || QUESTIONS[qi].items.map(()=>null);
  cur[ii]=v===''?null:parseInt(v); state.answers[qi]=[...cur]; render();
}
function showReviewModal(){ state.showModal=true; render(); }
function submitExam(){ clearInterval(timerInterval); state.screen='report'; render(); }

let dragVal=null, dragQi=null;
function dndStart(e,v,qi){ dragVal=v; dragQi=qi; }
function dndDrop(e,qi,ti){
  if(dragQi!==qi) return;
  const cur = state.answers[qi] || QUESTIONS[qi].targets.map(()=>null);
  cur[ti]=dragVal; state.answers[qi]=[...cur]; render();
}
function dndRemove(qi,ti){
  const cur = state.answers[qi] || QUESTIONS[qi].targets.map(()=>null);
  cur[ti]=null; state.answers[qi]=[...cur]; render();
}
let orderPos=null, orderQi=null;
function orderStart(e,p,qi){ orderPos=p; orderQi=qi; }
function orderDrop(e,p,qi){
  if(orderQi!==qi) return;
  const cur = state.answers[qi] || [...Array(QUESTIONS[qi].options.length).keys()];
  const item = cur.splice(orderPos,1)[0];
  cur.splice(p,0,item); state.answers[qi]=[...cur]; render();
}

render();
</script>
